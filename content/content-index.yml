# Content index for maintainers.
# This file is not consumed by the app directly.

content:
  - file: "/content/publications.yml"
    section: "Publications"
    notes: "Research outputs; each entry should include year for grouping."

  - file: "/content/news.yml"
    section: "News"
    notes: "Recent milestones and announcements; optional logo fields supported."

  - file: "/content/travel.yml"
    section: "Travel locations"
    notes: "Unique places with lat/lon and concise reason."

  - file: "/content/travel-routes.yml"
    section: "Travel routes"
    notes: "Ordered from/to route legs, optional count for repeated legs."

  - file: "/content/site-meta.json"
    section: "Generated metadata"
    notes: "Auto-generated by scripts/generate-last-updated.js."

assets:
  docs: "/assets/docs"
  audio: "/assets/audio"
  logos: "/assets/images/logos"
  profile_images: "/assets/images/profile"
  misc_images: "/assets/images/misc"
  illustrations: "/assets/images/illustrations"
